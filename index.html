<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <button class="print-btn" onclick="window.print()">🖨️ Imprimer Rapport A4</button>
    <h1>⚡ IMPACT LAB : ANALYSE SCIENTIFIQUE</h1>

    <div class="switcher">
        <button id="btn-demandeur" class="active" onclick="setView('demandeur')">Vue Demandeur</button>
        <button id="btn-entreprise" onclick="setView('entreprise')">Vue Entreprise</button>
    </div>

    <div class="sidebar">
        <h3>⚙️ Calibration</h3>
        <label>Bénéficiaires: <input type="number" id="n" value="100" oninput="update()"></label>
        <label>Succès Brut (%): <input type="range" id="s" value="45" oninput="update()"></label>
        <label>Aubaine (%): <input type="range" id="a" value="20" title="Succès sans intervention" oninput="update()"></label>
        <label>Sélection (%): <input type="range" id="sel" value="15" title="Profils déjà aptes" oninput="update()"></label>
        
        <hr>
        <div id="fields-demandeur">
            <h3>👤 Paramètres Demandeur</h3>
            <label>Gain Insertion (€): <input type="number" id="gain-indiv" value="12000" oninput="update()"></label>
            <label>Économie Sociale (€): <input type="number" id="gain-soc" value="5000" oninput="update()"></label>
        </div>
        <div id="fields-entreprise" style="display:none;">
            <h3>🏢 Paramètres Entreprise</h3>
            <label>Gain Productivité (€): <input type="number" id="gain-prod" value="8000" oninput="update()"></label>
            <label>Économie Recrutement (€): <input type="number" id="gain-recrut" value="3000" oninput="update()"></label>
        </div>
    </div>

    <div class="kpi-container">
        <div class="card"><h3>Impact Net</h3><h2 id="net">0</h2></div>
        <div class="card"><h3>Gain Net Fin.</h3><h2 id="gain-financier">0 €</h2></div>
        <div class="card"><h3>ROI Social</h3><h2 id="roi">0.00x</h2></div>
    </div>

    <div class="charts-container">
        <div class="chart-box">
            
            <canvas id="waterfallChart"></canvas>
        </div>
        <div class="chart-box">
            
            <canvas id="radarChart"></canvas>
        </div>
    </div>

    <div class="footer">
        <p><b>Méthodologie :</b> Approche contrefactuelle corrigée. <i>Aubaine</i> = Succès spontané. <i>Sélection</i> = Biais sur les publics faciles.</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
